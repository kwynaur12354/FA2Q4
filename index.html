<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form onsubmit="printReceipt(); return false;">
        <label for="fname">Full Name:</label><br>
        <input type="text" id="fname" name="fname"><br>
        <label for="GandS">Grade & Section:</label><br>
        <input type="text" id="GandS" name="GandS">

        <br><br><label for="menu">Food:</label>
        <select name="menu" id="menu">
            <option value="Chicken Meal">Chicken Meal (PhP 75)</option>
            <option value="Pork Meal ">Pork Meal (PhP 85)</option>
            <option value="Beef Meal">Beef Meal (PhP 105)</option>
        </select>

        <br><label for="quantity">Quantity (Max of 5):</label>
        <input type="number" id="quantity" name="quantity" min="1" max="5">

        <br><br><label for="cType">Costumer Type:</label><br>
        <select name="cType" id="cType">
            <option value="Student">Student</option>
            <option value="Faculty/Staff">Faculty/Staff</option>
        </select><br><br>

        <input type="submit" value="Place Order">
    </form>


    <div id="receipt"></div>

    <script>
        function calculateSubtotal(order, quantity){
            let price=0;
            switch(order) {
                case "Chicken Meal":
                    price = 75;
                    break;
                case "Pork Meal":
                    price = 85;
                    break;
                case "Beef Meal":
                    price = 105;
                    break;
                default:
                    return "Item not found";
            }
            return price * quantity;
        }

         function calculateDiscount(total, custType) {
            if (custType === "Student") {
                return total * 0.20; // 20% discount
            } else {
                return 0;
            }
        }

        function printReceipt() {
            let name = document.getElementById("fname").value;
            let grade = document.getElementById("GandS").value;
            let order = document.getElementById("menu").value;
            let quantity = parseInt(document.getElementById("quantity").value);
            let custType = document.getElementById("cType").value;

            let subtotal = calculateSubtotal(order, quantity);
            let discount = calculateDiscount(subtotal, custType);
            let total = subtotal - discount;

            document.getElementById("receipt").innerHTML = "<h3>ORDER SUMMARY</h3>"
                + "Name: " + name + "<br>"
                + "Grade & Section: " + grade + "<br>"
                + "Order: " + order + "<br>"
                + "Quantity: " + quantity + "<br>"
                + "Subtotal: PhP " + subtotal + "<br>"
                + "Discount: PhP " + discount + "<br>"
                + "Total: PhP " + total;

            return false; // prevent page reload
        }

    </script>

</body>
</html>
